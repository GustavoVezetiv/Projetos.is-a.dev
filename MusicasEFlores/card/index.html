<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cartão de amor 💌</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container" id="card-area">
      <div class="valentines">
        <div class="envelope"></div>
        <div class="front"></div>
        <div class="card">
          <div class="text">
            Feliz dia dos namorados ❤<br />Amor é quando até o silêncio entre
            nós tem sentido.
          </div>
          <div class="heart"></div>
        </div>
        <div class="hearts">
          <div class="one"></div>
          <div class="two"></div>
          <div class="three"></div>
          <div class="four"></div>
          <div class="five"></div>
        </div>
      </div>
    </div>
    <div class="shadow"></div>

    <script src="script.js"></script>
  </body>
</html>
